name: CompatHelper
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  CompatHelper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Run CompatHelper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPATHELPER_PRIV: ''
        run: |
          import Pkg
          Pkg.add("CompatHelper")
          using CompatHelper
          CompatHelper.main(; subdirs=["",
            "NyanSpectreNetlistParser.jl",
            "NyanVerilogAParser.jl"])
        shell: julia --color=yes {0}
