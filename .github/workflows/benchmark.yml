name: Benchmarks

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: VACASK Benchmarks - Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Install OpenVAF and compile OSDI test fixtures
        run: |
          curl -fsSL https://fides.fe.uni-lj.si/openvaf/download/openvaf-reloaded-osdi_0.4-153-g2e066436-linux_x64.tar.gz -o openvaf.tar.gz
          tar xzf openvaf.tar.gz
          chmod +x openvaf-r
          ./openvaf-r models/VADistillerModels.jl/va/diode.va -o test/osdi/diode.osdi
          ./openvaf-r models/PSPModels.jl/va/psp103.va -I models/PSPModels.jl/va -o test/osdi/psp103.osdi
          ls -la test/osdi/*.osdi

      - name: Install dependencies
        run: |
          julia --project=benchmarks -e '
            using Pkg
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Run VACASK benchmarks
        run: |
          julia --project=benchmarks benchmarks/vacask/run_benchmarks.jl benchmark_results.md

      - name: Publish benchmark results
        run: cat benchmark_results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-julia-${{ matrix.version }}
          path: benchmark_results.md
          retention-days: 30
