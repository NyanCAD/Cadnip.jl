name: Benchmarks

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: VACASK Benchmarks - Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub Actions per-job maximum; the real c6288 VACASK run is slow
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'

    steps:
      - uses: actions/checkout@v7

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v3

      - name: Install dependencies
        run: |
          julia --project=benchmarks -e '
            using Pkg
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Run real VACASK reference benchmarks
        run: |
          # Run every case including the slow c6288. The five small cases are
          # folded into run_benchmarks.jl's comparison tables; c6288 (which has
          # no Cadnip counterpart yet) is published in the standalone table.
          CASES="rc graetz mul darlington ring c6288" benchmarks/vacask/run_vacask.sh vacask_reference.md

      - name: Run VACASK benchmarks
        env:
          VACASK_REFERENCE_TSV: vacask_reference.tsv
        run: |
          julia --project=benchmarks benchmarks/vacask/run_benchmarks.jl benchmark_results.md

      - name: Run DC Newton method comparison (PCNR)
        # Iteration-count comparison across Cadnip's DC Newton methods (PCNR,
        # plain Newton, NonlinearSolve.jl algorithms) on hand-written diode
        # circuits -- see benchmarks/pcnr/README.md. Independent of the VACASK
        # circuits above, so a failure here shouldn't block those results.
        continue-on-error: true
        run: |
          julia --project=benchmarks benchmarks/pcnr/dc_newton_iterations.jl pcnr_results.md

      - name: Run Cadnip c6288 benchmark (-O0)
        # Separate process/step deliberately: c6288's generated builder (2419
        # inlined subckt calls) hits LLVM RAGreedy's super-linear blowup at
        # default -O2, so it needs its own `julia -O0` invocation rather than
        # sharing the process the other circuits benchmark in above. See
        # doc/c6288_bottleneck_findings.md.
        #
        # runme.jl's default mode (no solver arg) runs every solver in
        # SOLVERS_C6288 (IDA, Rodas5P -- FBDF is excluded, see runme.jl's
        # header comment for why it OOMs at this scale) in a single process
        # and writes the same markdown table format run_benchmarks.jl uses,
        # folding in the VACASK reference row via $VACASK_REFERENCE_TSV.
        continue-on-error: true
        env:
          VACASK_REFERENCE_TSV: vacask_reference.tsv
        run: |
          julia -O0 --project=benchmarks benchmarks/vacask/c6288/cedarsim/runme.jl c6288_results.md

      - name: Publish benchmark results
        if: always()
        run: |
          cat benchmark_results.md >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          cat vacask_reference.md >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          cat pcnr_results.md >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no PCNR output captured)" >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          cat c6288_results.md >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no c6288 output captured)" >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-julia-${{ matrix.version }}
          path: |
            benchmark_results.md
            vacask_reference.md
            vacask_reference.tsv
            pcnr_results.md
            c6288_results.md
          retention-days: 30

  # Work-precision diagrams: accuracy-per-runtime (adaptive tolerance sweep),
  # Cadnip solver families vs the real VACASK. The report embeds inline ASCII
  # plots, so it renders directly in the job summary.
  work-precision:
    name: Work-Precision Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - uses: julia-actions/cache@v3

      - name: Install dependencies
        run: |
          julia --project=benchmarks -e '
            using Pkg
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Fetch VACASK release
        run: benchmarks/vacask/fetch_vacask.sh

      - name: Run work-precision benchmark
        run: julia --project=benchmarks benchmarks/vacask/wpd/run_wpd.jl

      - name: Publish work-precision report
        run: cat benchmarks/vacask/wpd/out/wpd_results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload work-precision report
        uses: actions/upload-artifact@v7
        with:
          name: work-precision-report
          # wpd_results.md (tables + inline ASCII plots, same as the job summary)
          # plus higher-quality PNG/SVG plots (not embedded in the summary - see
          # run_wpd.jl's save_plot).
          path: |
            benchmarks/vacask/wpd/out/wpd_results.md
            benchmarks/vacask/wpd/out/plots/*.png
            benchmarks/vacask/wpd/out/plots/*.svg
          retention-days: 30
