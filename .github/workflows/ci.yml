name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Shared precompile job - builds Julia depot once per version
  precompile:
    name: Precompile - Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}

      # Restore depot from previous runs
      - uses: actions/cache/restore@v4
        with:
          path: ~/.julia
          key: julia-depot-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            julia-depot-${{ matrix.version }}-

      - name: Precompile test environment
        run: |
          julia --project=test -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="."),
              PackageSpec(path="NyanSpectreNetlistParser.jl"),
              PackageSpec(path="NyanVerilogAParser.jl"),
              PackageSpec(path="NyanLexers.jl")
            ])
            Pkg.instantiate()
            Pkg.precompile()
          '

      # Save depot for downstream jobs and future runs
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.julia
          key: julia-depot-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}-${{ github.sha }}

  # Core tests
  test-core:
    name: Core Tests - Julia ${{ matrix.version }}
    needs: precompile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}

      - uses: actions/cache/restore@v4
        with:
          path: ~/.julia
          key: julia-depot-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}-${{ github.sha }}
          restore-keys: |
            julia-depot-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}
            julia-depot-${{ matrix.version }}-

      - name: Resolve test environment
        run: |
          julia --project=test -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="."),
              PackageSpec(path="NyanSpectreNetlistParser.jl"),
              PackageSpec(path="NyanVerilogAParser.jl"),
              PackageSpec(path="NyanLexers.jl")
            ])
            Pkg.instantiate()
          '

      - name: Run Cadnip core tests
        run: julia --project=test test/runtests.jl

  # Integration tests - heavy VA model parsing, separate to avoid OOM
  test-integration:
    name: Integration Tests - Julia ${{ matrix.version }}
    needs: precompile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}

      - uses: actions/cache/restore@v4
        with:
          path: ~/.julia
          key: julia-depot-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}-${{ github.sha }}
          restore-keys: |
            julia-depot-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}
            julia-depot-${{ matrix.version }}-

      - name: Resolve test environment
        run: |
          julia --project=test -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="."),
              PackageSpec(path="NyanSpectreNetlistParser.jl"),
              PackageSpec(path="NyanVerilogAParser.jl"),
              PackageSpec(path="NyanLexers.jl")
            ])
            Pkg.instantiate()
          '

      - name: Run Cadnip integration tests
        run: julia --project=test test/runtests.jl integration

  # Benchmarks - uses the same test environment
  benchmark:
    name: Benchmarks - Julia ${{ matrix.version }}
    needs: precompile
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}

      - uses: actions/cache/restore@v4
        with:
          path: ~/.julia
          key: julia-depot-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}-${{ github.sha }}
          restore-keys: |
            julia-depot-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}
            julia-depot-${{ matrix.version }}-

      - name: Resolve test environment
        run: |
          julia --project=test -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="."),
              PackageSpec(path="NyanSpectreNetlistParser.jl"),
              PackageSpec(path="NyanVerilogAParser.jl"),
              PackageSpec(path="NyanLexers.jl")
            ])
            Pkg.instantiate()
          '

      - name: Run VACASK benchmarks
        run: julia --project=test benchmarks/vacask/run_benchmarks.jl benchmark_results.md

      - name: Publish benchmark results
        run: cat benchmark_results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-julia-${{ matrix.version }}
          path: benchmark_results.md
          retention-days: 30
