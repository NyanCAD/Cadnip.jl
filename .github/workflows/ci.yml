name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Core tests - run quickly without heavy VA model parsing
  test-core:
    name: Core Tests - Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v3

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
          '

      - name: Run NyanSpectreNetlistParser tests
        run: |
          julia --project=NyanSpectreNetlistParser.jl -e '
            using Pkg
            Pkg.instantiate()
            Pkg.test()
          '

      - name: Run NyanVerilogAParser tests
        run: |
          julia --project=NyanVerilogAParser.jl -e '
            using Pkg
            Pkg.instantiate()
            Pkg.test()
          '

      - name: Disable heavy precompile workloads
        run: |
          cat > test/LocalPreferences.toml << 'EOF'
          [PSPModels]
          precompile_workload = false

          [VADistillerModels]
          precompile_workload = false

          [VACASKModels]
          precompile_workload = false
          EOF

      - name: Install and precompile test dependencies
        run: |
          julia --project=test -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="."),
              PackageSpec(path="NyanSpectreNetlistParser.jl"),
              PackageSpec(path="NyanVerilogAParser.jl"),
              PackageSpec(path="NyanLexers.jl")
            ])
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Run Cadnip core tests
        run: julia --project=test test/runtests.jl

  # Integration tests - heavy VA model parsing, run separately to avoid OOM
  test-integration:
    name: Integration Tests - Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v3

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
          '

      - name: Install and precompile test dependencies
        run: |
          julia --project=test -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="."),
              PackageSpec(path="NyanSpectreNetlistParser.jl"),
              PackageSpec(path="NyanVerilogAParser.jl"),
              PackageSpec(path="NyanLexers.jl")
            ])
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Run Cadnip integration tests
        run: julia --project=test test/runtests.jl integration
